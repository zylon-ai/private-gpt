name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: .github/release_please/.release-please-config.json
          manifest-file: .github/release_please/.release-please-manifest.json
          token: ${{ secrets.PAT }}
