name: tests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.run_ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run_ci:
              - 'private_gpt/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'Makefile'
              - 'Dockerfile'
              - '.github/workflows/tests.yml'

  setup:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/install_dependencies

  checks:
    needs: [changes, setup]
    if: github.event_name != 'pull_request' || needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    name: ${{ matrix.quality-command }}
    strategy:
      matrix:
        quality-command:
          - black
          - ruff
          - mypy
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/install_dependencies
      - name: run ${{ matrix.quality-command }}
        run: make ${{ matrix.quality-command }}

  test:
    needs: [changes, setup]
    if: github.event_name != 'pull_request' || needs.changes.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    name: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions/install_dependencies
      - name: run test
        run: make test-coverage
      # Run even if make test fails for coverage reports
      # TODO: select a better xml results displayer
      - name: Archive test results coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test_results
          path: tests-results.xml
      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: htmlcov/

  all_checks_passed:
    # Used to easily force requirements checks in GitHub
    needs:
      - changes
      - checks
      - test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ needs.changes.outputs.run_ci }}" != "true" ]; then
            echo "No source changes detected; skipping CI checks."
          else
            echo "All checks passed"
          fi
